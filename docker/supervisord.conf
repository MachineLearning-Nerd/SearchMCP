[supervisord]
nodaemon=true
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid
childlogdir=/var/log/supervisor
user=root

[program:searxng]
command=/usr/local/searxng/entrypoint.sh
directory=/usr/local/searxng
user=root
autostart=true
autorestart=true
startsecs=2
startretries=3
stdout_logfile=/var/log/supervisor/searxng.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=5
stderr_logfile=/var/log/supervisor/searxng-error.log
stderr_logfile_maxbytes=10MB
environment=SEARXNG_SETTINGS_PATH="/etc/searxng/settings.yml"

[program:web-mcp]
command=/usr/local/searxng/.venv/bin/python -m web_mcp.server
directory=/app
user=root
autostart=true
autorestart=true
startsecs=2
startretries=3
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
environment=SEARXNG_URL="http://127.0.0.1:8080",PYTHONUNBUFFERED="1"
